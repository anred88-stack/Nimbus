name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test -- --coverage

      - name: Validation gate (strict)
        # The strict gate (closes H7) runs the V&V replay corpus + the
        # executable golden dataset and writes docs/VALIDATION_REPORT.md
        # plus a machine-readable JSON sidecar. It exits 1 if any
        # fixture or golden case fails — see `scripts/generate-validation-report.ts`
        # `gate()` for the policy. Keep this AFTER `pnpm test` so the
        # underlying assertions have already passed individually; this
        # step is the cumulative regression gate.
        run: pnpm validation-report -- --mode=strict

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            docs/VALIDATION_REPORT.md
            docs/VALIDATION_REPORT.json
          retention-days: 30

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: pnpm bundle:size

      - name: Build Storybook
        run: pnpm build-storybook --quiet

      - name: Upload coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
