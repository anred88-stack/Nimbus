name: Release

# Cuts a GitHub Release when a signed `v*` tag is pushed. Re-runs
# every quality gate against the tagged commit first (typecheck,
# lint, format, unit, build, build-storybook, full Playwright
# matrix) so a broken release can't slip past just because the
# tag was pushed locally. The release body is extracted from the
# matching section of CHANGELOG.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook --quiet

  publish:
    name: Publish GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ github.ref_name }}'
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No '## [${VERSION}]' section in CHANGELOG.md; falling back to tag message."
            NOTES="See CHANGELOG.md for the full history of this release."
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$NOTES"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          make_latest: true
